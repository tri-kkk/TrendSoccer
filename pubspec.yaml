name: trendsoccer
description: "A new Flutter project."
publish_to: 'none'

version: 0.1.2+3

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^3.3.1
  go_router: ^17.2.0
  dio: ^5.7.0
  supabase_flutter: ^2.8.0
  flutter_dotenv: ^5.2.1
  flutter_svg: ^2.0.10  # SVG support
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  url_launcher: ^6.3.1
  shared_preferences: ^2.5.5
  google_sign_in: ^6.2.2
  flutter_naver_login: ^2.1.1
  firebase_core: ^3.8.0
  firebase_analytics: ^11.3.6
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^18.0.0
  flutter_secure_storage: ^9.2.3
  package_info_plus: ^8.1.0
  flutter_markdown: ^0.7.7+1
  in_app_purchase: ^3.2.0
  in_app_purchase_android: ^0.4.0+11
  in_app_review: ^2.0.9
  permission_handler: ^11.3.0
  google_mobile_ads: ^5.3.0
  connectivity_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - .env

    # Logos
    - assets/images/tsLogo/dark/
    - assets/images/tsLogo/light/

    # League Icons (Analysis)
    - assets/images/league/icon/dark/
    - assets/images/league/icon/light/

    # League Logos (Report)
    - assets/images/league/logo/dark/
    - assets/images/league/logo/light/

    # Background images
    - assets/images/bg/

    # Social login symbols (Auth)
    - assets/images/social/

    # UI icons
    - assets/images/icon/foundation/
    - assets/images/icon/sport/

    # Plan ticket images (Menu)
    - assets/images/plan/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins/Poppins-ExtraBold.ttf
          weight: 800
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard/Pretendard-Bold.otf
          weight: 700
        - asset: assets/fonts/Pretendard/Pretendard-ExtraBold.otf
          weight: 800
